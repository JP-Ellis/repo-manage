#:schema https://raw.githubusercontent.com/j178/prek/refs/heads/master/prek.schema.json
#:tombi toml-version = "v1.1.0"

default_install_hook_types = ["pre-commit", "pre-push"]
default_stages             = ["pre-commit"]

# Generic hooks that apply to a lot of files
[[repos]]
repo  = "https://github.com/pre-commit/pre-commit-hooks"
rev   = "v6.0.0"
hooks = [
  { id = "check-added-large-files" },
  { id = "check-case-conflict" },
  { id = "check-executables-have-shebangs" },
  { id = "check-illegal-windows-names" },
  { id = "check-merge-conflict" },
  { id = "check-shebang-scripts-are-executable" },
  { id = "check-symlinks" },
  { id = "check-vcs-permalinks" },
  { id = "destroyed-symlinks" },
  { id = "end-of-file-fixer" },
  { id = "fix-byte-order-marker" },
  { id = "mixed-line-ending" },
  { id = "trailing-whitespace" },
]

[[repos]]
repo  = "https://github.com/lyz-code/yamlfix/"
rev   = "1.19.1"
hooks = [
  { id = "yamlfix" },
]

[[repos]]
repo  = "https://gitlab.com/bmares/check-json5"
rev   = "v1.0.1"
hooks = [
  { id = "check-json5" },
]

[[repos]]
repo  = "https://github.com/biomejs/pre-commit"
rev   = "v2.4.12"
hooks = [
  { id = "biome-check", additional_dependencies = ["@biomejs/biome@1.9.2"] },
]

# TOML formatting (tombi replaces taplo)
[[repos]]
repo  = "https://github.com/tombi-toml/tombi-pre-commit"
rev   = "v0.9.9"
hooks = [
  { id = "tombi-format", exclude = '(^|/)Cargo\.lock$' },
  { id = "tombi-lint" },
]

[[repos]]
repo  = "https://github.com/astral-sh/ruff-pre-commit"
rev   = "v0.15.11"
hooks = [
  { id = "ruff", args = ["--fix", "--exit-non-zero-on-fix"] },
  { id = "ruff-format" },
]

[[repos]]
repo  = "https://github.com/crate-ci/committed"
rev   = "v1.1.11"
hooks = [
  { id = "committed" },
]

[[repos]]
repo  = "https://github.com/DavidAnson/markdownlint-cli2"
rev   = "v0.22.0"
hooks = [
  { id = "markdownlint-cli2" },
]

[[repos]]
repo  = "https://github.com/crate-ci/typos"
rev   = "v1.45.1"
hooks = [
  { id = "typos" },
]

[[repos]]
repo  = "https://github.com/shellcheck-py/shellcheck-py"
rev   = "v0.10.0.1"
hooks = [
  { id = "shellcheck", args = ["--external-sources"] },
]

[[repos]]
repo  = "https://github.com/scop/pre-commit-shfmt"
rev   = "v3.11.0-1"
hooks = [
  { id = "shfmt" },
]

[[repos]]
repo  = "local"
hooks = [
  {
    id             = "mypy",
    name           = "mypy",
    entry          = "hatch",
    args           = ["run", "mypy"],
    language       = "system",
    types          = ["python"],
    stages         = ["pre-push"],
    pass_filenames = false,
  },
]
